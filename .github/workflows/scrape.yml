name: 车型价格抓取

on:
  schedule:
    # 每天北京时间 04:00 (UTC+8 = UTC 20:00 前一天)
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      discover:
        description: '全量发现新车型 (含摩托范遍历)'
        type: boolean
        default: false
      target:
        description: '写入目标'
        type: choice
        options:
          - cloudbase
          - seed-file
        default: 'cloudbase'

env:
  NODE_VERSION: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Chrome (Puppeteer 依赖)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 运行抓取 (CloudBase 模式)
        if: github.event.inputs.target != 'seed-file'
        run: |
          if [ "${{ github.event.inputs.discover }}" = "true" ]; then
            echo "[抓取] 全量发现 + 增量刷新 → CloudBase"
            node server/scraper/run-once.js --discover
          else
            echo "[抓取] 仅增量刷新 → CloudBase"
            node server/scraper/run-once.js
          fi
        env:
          CHROME_PATH: ${{ env.CHROME_PATH }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}

      - name: 运行抓取 (种子文件模式)
        if: github.event.inputs.target == 'seed-file'
        run: |
          echo "[抓取] 写入本地 JSON → 后续 commit seed 文件"
          node server/scraper/run-once.js
        env:
          CHROME_PATH: ${{ env.CHROME_PATH }}

      - name: 同步种子数据 (仅 seed-file 模式)
        if: github.event.inputs.target == 'seed-file'
        run: npm run sync-seed

      - name: 提交种子更新 (仅 seed-file 模式)
        if: github.event.inputs.target == 'seed-file'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models.seed.json
          if git diff --staged --quiet; then
            echo "数据无变化, 跳过提交"
          else
            NOW=$(date -u +"%Y-%m-%d")
            git commit -m "chore(scrape): 自动更新车型价格数据 ($NOW)"
            git push
            echo "已提交并推送更新"
          fi
